<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Thói quen mỗi ngày</title>
  <meta name="description" content="Theo dõi thói quen hằng ngày và sự kiện quan trọng, riêng tư và đồng bộ mọi thiết bị." />
  <meta name="theme-color" content="#F5F1E8" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app"></div>

  <!-- Thứ tự nạp quan trọng: config trước, rồi tầng dữ liệu, rồi view, rồi app.js -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/storage-local.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/tree-icons.js"></script>
  <script src="js/event-section.js"></script>
  <script src="js/views/today.js"></script>
  <script src="js/views/year.js"></script>
  <script src="js/views/day-detail.js"></script>
  <script src="js/views/stats.js"></script>
  <script src="js/export-data.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(err => {
          console.warn('Không đăng ký được service worker:', err);
        });
      });
    }
  </script>

</body>
</html>
